<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CinePicks - Your Movie & TV Show Guide</title>
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <header>
            <h1> CinePicks 🎬</h1>
            <p>Curated films for true cinema lovers</p>
        </header>

        <main>
            <section class="intro">
                <h2>Welcome to CinePicks</h2>
                <p>
                    Discover handpicked movies and TV shows tailored to your tastes!
                </p>
            </section>
            <section class="filters">
                <button data-genre="all">All</button>
                <button data-genre="drama">Drama</button>
                <button data-genre="sci-fi">Sci-Fi</button>
                <button data-genre="romance">Romance</button>
            </section>   

             <section class="movies">
                <!-- movie cards here -->
                <div class="movie-card" data-genre="drama">
                <img src="images/lalaland.jpg" alt="La La Land Poster">
                <h3>La La Land</h3>
                <span>Drama • 2016</span>
                <p>A jazz musician and an aspiring actress fall in love while pursuing their dreams.</p>
</div>
            </section>

            <script src="script.js"></script>
        </main>
        <footer>
            <p>&copy; 2024 CinePicks. All rights reserved.</p>
        </footer>
    </body>

</html>
